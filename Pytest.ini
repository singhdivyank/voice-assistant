[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: async test
    unit: unit tests (no external deps)
    integration: integration tests (real FastAPI app, mocked externals)