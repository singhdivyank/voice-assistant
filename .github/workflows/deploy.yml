name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{github.event.workflow_run.conclusion == 'success'}}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy docjarvis-backend \
              --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docjarvis/backend:${{ github.event.workflow_run.head_sha }} \
              --platform managed \
              --region us-central1 \
              --allow-unauthenticated \
              --memory 2Gi \
              --cpu 2 \
              --timeout 300 \
              --concurrency 10 \
              --max-instances 1 \
              --cpu-boost \
              --set-env-vars "ENVIRONMENT=prod" \
              --set-env-vars "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" \
              --set-env-vars "DOCTOR_EMAIL=${{ secrets.DOCTOR_EMAIL }}" \
              --set-env-vars "GMAIL_CREDENTIALS_B64=${{ secrets.GMAIL_CREDENTIALS_B64 }}" \
              --set-env-vars "GMAIL_TOKEN_B64=${{ secrets.GMAIL_TOKEN_B64 }}" \
              --set-env-vars "CREWAI_TRACING_ENABLED=false" \
              --set-env-vars "CREWAI_DISABLE_TELEMETRY=true"

      - name: Get Cloud Run URL
        run: |
          URL=$(gcloud run services describe docjarvis-backend \
          --region us-central1 \
          --format 'value(status.url)')
          echo "Backend deployed at: $URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to vercel
        working-directory: frontend
        run: |
          vercel --prod --token=${{ secrets.VERCEL_TOKEN}}
        env:
          VITE_API_URL_V1: ${{ secrets.VITE_API_URL_V1 }}
          VITE_API_URL_V2: ${{ secrets.VITE_API_URL_V2 }}
