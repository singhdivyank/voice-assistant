name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir .
          pip install pytest pytest-cov pytest-asyncio pylint httpx

      - name: Lint
        working-directory: backend
        run: pylint src || true

      - name: Set up Gmail credentials
        run: |
          if [ -n "${{ secrets.GMAIL_CREDENTIALS_JSON }}" ]; then
            echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > backend/credentials.json
          fi
          if [ -n "${{ secrets.GMAIL_TOKEN_B64 }}" ]; then
            echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > backend/token.json
          fi

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=src --cov-report=xml
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_CREDENTIALS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint & Typecheck
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY}}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dockjarvis/backend:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dockjarvis/backend:latest \
            --push \
            ./backend
